<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login ke BAS Recruitment — Masuk atau buat akun untuk mendaftar sebagai driver profesional.">
    <title>BAS Recruitment — Login</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="js/theme.js"></script>
    <style>
        /* ── Page Layout ─────────────────────── */
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        .login-page::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 40%, var(--accent-glow) 0%, transparent 50%),
                        radial-gradient(circle at 70% 70%, rgba(135,206,235,0.06) 0%, transparent 40%);
            animation: loginGlow 10s ease-in-out infinite alternate;
            pointer-events: none;
        }
        @keyframes loginGlow {
            0%   { transform: translate(0,0) scale(1); }
            100% { transform: translate(-3%,3%) scale(1.08); }
        }

        /* ── Card ────────────────────────────── */
        .login-card {
            position: relative; z-index: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 44px 38px;
            max-width: 440px; width: 100%;
            box-shadow: var(--shadow-lg);
            animation: cardIn 0.6s cubic-bezier(.4,0,.2,1) forwards;
        }
        @keyframes cardIn {
            from { opacity:0; transform:translateY(30px) scale(.96); }
            to   { opacity:1; transform:translateY(0) scale(1); }
        }

        /* ── Logo ────────────────────────────── */
        .login-logo { display:flex; justify-content:center; margin-bottom:4px; }
        .login-logo img { height:110px; width:auto; mix-blend-mode:multiply; transition:var(--transition); }
        [data-theme="dark"] .login-logo img { filter:invert(1); mix-blend-mode:screen; }
        .login-tagline {
            font-size:.8rem; color:var(--accent); font-weight:600;
            letter-spacing:1.5px; text-transform:uppercase;
            text-align:center; margin-bottom:24px;
        }

        /* ── Tabs ────────────────────────────── */
        .auth-tabs {
            display:flex; border-radius:var(--radius-md);
            background:var(--bg-secondary); padding:4px; margin-bottom:24px;
        }
        .auth-tab {
            flex:1; padding:11px; text-align:center;
            font-weight:600; font-size:.88rem;
            border-radius:var(--radius-sm); cursor:pointer;
            transition:var(--transition); color:var(--text-muted);
            border:none; background:transparent; font-family:var(--font);
        }
        .auth-tab.active { background:var(--bg-card); color:var(--text-primary); box-shadow:var(--shadow-sm); }
        .auth-tab:hover:not(.active) { color:var(--text-primary); }

        /* ── Views ───────────────────────────── */
        .auth-view { display:none; }
        .auth-view.active { display:block; animation:fadeUp .3s ease; }
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(10px); }
            to   { opacity:1; transform:translateY(0); }
        }

        /* ── Form ────────────────────────────── */
        .form-group { margin-bottom:16px; }
        .form-label { display:block; font-weight:600; font-size:.83rem; margin-bottom:5px; color:var(--text-secondary); }
        .form-input {
            width:100%; padding:11px 15px;
            background:var(--bg-input); border:1.5px solid var(--border);
            border-radius:var(--radius-md); font-family:var(--font);
            font-size:.93rem; color:var(--text-primary);
            transition:var(--transition); box-sizing:border-box;
        }
        .form-input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }

        /* ── Footer / Links ──────────────────── */
        .login-footer { text-align:center; margin-top:20px; }
        .login-footer a { font-size:.85rem; color:var(--text-muted); transition:var(--transition); }
        .login-footer a:hover { color:var(--accent); }

        .form-link {
            display:block; text-align:right; margin-top:-8px; margin-bottom:16px;
            font-size:.82rem; color:var(--accent); cursor:pointer;
            transition:var(--transition); background:none; border:none;
            font-family:var(--font); padding:0;
        }
        .form-link:hover { text-decoration:underline; }

        /* ── Error ────────────────────────────── */
        .login-error {
            background:rgba(220,38,38,.1); border:1px solid rgba(220,38,38,.3);
            color:var(--error); padding:10px 14px;
            border-radius:var(--radius-sm); font-size:.83rem;
            margin-bottom:14px; display:none;
        }
        .login-error.show { display:block; animation:fadeUp .2s ease; }

        /* ── Success ─────────────────────────── */
        .login-success {
            background:rgba(34,197,94,.1); border:1px solid rgba(34,197,94,.3);
            color:#16a34a; padding:10px 14px;
            border-radius:var(--radius-sm); font-size:.83rem;
            margin-bottom:14px; display:none;
        }
        [data-theme="dark"] .login-success { color:#4ade80; }
        .login-success.show { display:block; animation:fadeUp .2s ease; }

        /* ── Divider ─────────────────────────── */
        .auth-divider {
            display:flex; align-items:center; gap:14px;
            margin:18px 0; color:var(--text-muted); font-size:.78rem;
        }
        .auth-divider::before, .auth-divider::after { content:''; flex:1; height:1px; background:var(--border); }

        /* ── Google Button ────────────────────── */
        .google-btn {
            display:flex; align-items:center; justify-content:center; gap:10px;
            width:100%; padding:12px 18px;
            background:var(--bg-input); border:1.5px solid var(--border);
            border-radius:var(--radius-md); font-family:var(--font);
            font-weight:600; font-size:.93rem; color:var(--text-primary);
            cursor:pointer; transition:var(--transition);
        }
        .google-btn:hover { border-color:var(--accent); background:var(--accent-light); transform:translateY(-1px); box-shadow:var(--shadow-sm); }
        .google-btn svg { width:18px; height:18px; flex-shrink:0; }

        /* ── Theme Toggle ────────────────────── */
        .login-theme-toggle { position:fixed; top:20px; right:20px; z-index:10; }

        /* ── Modal Overlay ────────────────────── */
        .modal-overlay {
            display:none; position:fixed; inset:0;
            background:rgba(0,0,0,.5); backdrop-filter:blur(4px);
            z-index:100; align-items:center; justify-content:center; padding:20px;
        }
        .modal-overlay.active { display:flex; animation:fadeUp .3s ease; }
        .modal-box {
            background:var(--bg-card); border:1px solid var(--border);
            border-radius:var(--radius-xl); padding:34px 30px;
            max-width:420px; width:100%; box-shadow:var(--shadow-lg);
        }
        .modal-box h3 { font-size:1.15rem; font-weight:700; margin-bottom:6px; }
        .modal-box p { font-size:.83rem; color:var(--text-muted); margin-bottom:18px; line-height:1.5; }
        .modal-cancel { text-align:center; margin-top:14px; }
        .modal-cancel a { font-size:.83rem; color:var(--text-muted); cursor:pointer; }
        .modal-cancel a:hover { color:var(--accent); }

        /* ── Google User Preview ─────────────── */
        .google-user-preview {
            display:flex; align-items:center; gap:12px;
            padding:12px; background:var(--bg-secondary);
            border-radius:var(--radius-md); margin-bottom:18px;
        }
        .google-user-preview img { width:40px; height:40px; border-radius:50%; }
        .google-user-preview .pv-name { font-weight:600; font-size:.85rem; }
        .google-user-preview .pv-email { color:var(--text-muted); font-size:.78rem; }

        /* ── Password Toggle ─────────────────── */
        .pw-toggle {
            position:absolute; right:12px; top:34px;
            background:none; border:none; cursor:pointer;
            color:var(--text-muted); padding:4px;
            transition:var(--transition); line-height:0;
        }
        .pw-toggle:hover { color:var(--accent); }
        .pw-toggle.active { color:var(--accent); }

        @media (max-width:480px) {
            .login-card { padding:32px 22px; }
            .modal-box { padding:26px 18px; }
        }
    </style>
</head>
<body>

    <!-- Theme Toggle -->
    <div class="login-theme-toggle">
        <div class="theme-toggle" id="themeToggle" title="Toggle Dark/Light Mode">
            <div class="theme-toggle-knob"></div>
        </div>
    </div>

    <!-- ═══════════════════════════════════════ -->
    <!-- MAIN LOGIN CARD                        -->
    <!-- ═══════════════════════════════════════ -->
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo"><img src="LogoBas.png" alt="BAS Logo"></div>
            <div class="login-tagline">Recruitment System</div>

            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="loginView" id="tabLogin">Masuk</button>
                <button class="auth-tab" data-tab="registerView" id="tabRegister">Buat Akun</button>
            </div>

            <!-- Error / Success -->
            <div class="login-error" id="authError"></div>
            <div class="login-success" id="authSuccess"></div>

            <!-- ═══ LOGIN VIEW ═══ -->
            <div class="auth-view active" id="loginView">
                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label">Username / NIK</label>
                        <input type="text" class="form-input" id="loginUsername" placeholder="Masukkan username atau NIK" required autocomplete="username">
                    </div>
                    <div class="form-group" style="position:relative;">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" id="loginPassword" placeholder="Masukkan password" required autocomplete="current-password" style="padding-right:44px;">
                        <button type="button" class="pw-toggle" onclick="togglePassword('loginPassword', this)" aria-label="Tampilkan password">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                    <button type="button" class="form-link" onclick="openForgotModal()">Lupa Password?</button>
                    <button type="submit" class="btn btn-primary btn-lg btn-block" id="loginBtn">Masuk</button>
                </form>
                <div class="auth-divider">atau</div>
                <button class="google-btn" onclick="triggerGoogleSignIn()">
                    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    Masuk dengan Google
                </button>
            </div>

            <!-- ═══ REGISTER VIEW ═══ -->
            <div class="auth-view" id="registerView">
                <form id="registerForm">
                    <div class="form-group">
                        <label class="form-label">NIK (Nomor Induk Kependudukan)</label>
                        <input type="text" class="form-input" id="regNik" placeholder="16 digit NIK" required pattern="[0-9]{16}" minlength="16" maxlength="16" inputmode="numeric">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-input" id="regUsername" placeholder="Buat username (huruf, angka, _)" required autocomplete="username" pattern="[a-zA-Z0-9_]{3,50}" minlength="3" maxlength="50">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Nama Lengkap</label>
                        <input type="text" class="form-input" id="regName" placeholder="Nama lengkap Anda" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" id="regEmail" placeholder="email@contoh.com" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label class="form-label">No. Telepon / WhatsApp</label>
                        <input type="tel" class="form-input" id="regPhone" placeholder="08xxxxxxxxxx" required inputmode="numeric" pattern="[0-9]{10,15}" minlength="10" maxlength="15">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" id="regPassword" placeholder="Minimal 6 karakter" required minlength="6" autocomplete="new-password">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Konfirmasi Password</label>
                        <input type="password" class="form-input" id="regPasswordConfirm" placeholder="Ulangi password" required minlength="6" autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg btn-block" id="registerBtn">Buat Akun</button>
                </form>
                <div class="auth-divider">atau</div>
                <button class="google-btn" onclick="triggerGoogleSignIn()">
                    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    Daftar dengan Google
                </button>
            </div>

            <!-- Footer -->
            <div class="login-footer">
                <a href="index.html">← Kembali ke Beranda</a>
            </div>
        </div>
    </div>

    <!-- ═══════════════════════════════════════ -->
    <!-- FORGOT PASSWORD MODAL                  -->
    <!-- ═══════════════════════════════════════ -->
    <div class="modal-overlay" id="forgotModal">
        <div class="modal-box">
            <h3>🔑 Lupa Password</h3>
            <p>Masukkan NIK dan email yang terdaftar untuk mereset password Anda.</p>

            <div class="login-error" id="forgotError"></div>
            <div class="login-success" id="forgotSuccess"></div>

            <form id="forgotForm">
                <div class="form-group">
                    <label class="form-label">NIK (16 digit)</label>
                    <input type="text" class="form-input" id="forgotNik" placeholder="Masukkan NIK Anda" required pattern="[0-9]{16}" minlength="16" maxlength="16" inputmode="numeric">
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="forgotEmail" placeholder="Email yang terdaftar" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password Baru</label>
                    <input type="password" class="form-input" id="forgotNewPassword" placeholder="Minimal 6 karakter" required minlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label">Konfirmasi Password Baru</label>
                    <input type="password" class="form-input" id="forgotNewPasswordConfirm" placeholder="Ulangi password baru" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary btn-lg btn-block" id="forgotBtn">Reset Password</button>
            </form>

            <div class="modal-cancel">
                <a onclick="closeForgotModal()">Batal</a>
            </div>
        </div>
    </div>

    <!-- ═══════════════════════════════════════ -->
    <!-- GOOGLE COMPLETE MODAL                  -->
    <!-- ═══════════════════════════════════════ -->
    <div class="modal-overlay" id="googleModal">
        <div class="modal-box">
            <h3>Lengkapi Data Anda</h3>
            <p>Akun Google Anda belum terdaftar. Isi data berikut untuk membuat akun.</p>

            <div class="google-user-preview" id="googlePreview"></div>
            <div class="login-error" id="googleError"></div>

            <form id="googleCompleteForm">
                <div class="form-group">
                    <label class="form-label">NIK (16 digit)</label>
                    <input type="text" class="form-input" id="gNik" placeholder="16 digit NIK" required pattern="[0-9]{16}" minlength="16" maxlength="16" inputmode="numeric">
                </div>
                <div class="form-group">
                    <label class="form-label">No. Telepon / WhatsApp</label>
                    <input type="tel" class="form-input" id="gPhone" placeholder="08xxxxxxxxxx" required inputmode="numeric" pattern="[0-9]{10,15}" minlength="10" maxlength="15">
                </div>
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-input" id="gUsername" placeholder="Buat username" required pattern="[a-zA-Z0-9_]{3,50}" minlength="3" maxlength="50">
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="gPassword" placeholder="Minimal 6 karakter" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary btn-lg btn-block" id="gCompleteBtn">Buat Akun</button>
            </form>

            <div class="modal-cancel">
                <a onclick="document.getElementById('googleModal').classList.remove('active')">Batal</a>
            </div>
        </div>
    </div>

    <!-- ═══════════════════════════════════════ -->
    <!-- SCRIPTS                                -->
    <!-- ═══════════════════════════════════════ -->
    <script src="js/user-auth.js"></script>
    <script>
        let pendingGoogleData = null;

        // ── Auto-redirect if already logged in ──
        (async () => {
            const user = await checkUserAuth();
            if (user) redirectByRole(user.role);
        })();

        // ── Tab switching ───────────────────────
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.auth-view').forEach(v => v.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab).classList.add('active');
                hideError(); hideSuccess();
            });
        });

        // Auto-switch to Register if #register hash
        if (window.location.hash === '#register') {
            document.getElementById('tabLogin').classList.remove('active');
            document.getElementById('tabRegister').classList.add('active');
            document.getElementById('loginView').classList.remove('active');
            document.getElementById('registerView').classList.add('active');
        }

        // ── Error / Success helpers ─────────────
        function showError(msg) { const e = document.getElementById('authError'); e.textContent = msg; e.classList.add('show'); }
        function hideError()    { document.getElementById('authError').classList.remove('show'); }
        function showSuccess(msg) { const e = document.getElementById('authSuccess'); e.textContent = msg; e.classList.add('show'); }
        function hideSuccess()    { document.getElementById('authSuccess').classList.remove('show'); }

        // ── Password Toggle ─────────────────────
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.classList.add('active');
                btn.innerHTML = '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
            } else {
                input.type = 'password';
                btn.classList.remove('active');
                btn.innerHTML = '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
            }
        }

        // ── LOGIN FORM ──────────────────────────
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError(); hideSuccess();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true; btn.textContent = 'Memproses...';

            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const result = await handleLogin(username, password);

            if (result.error) {
                showError(result.error);
                btn.disabled = false; btn.textContent = 'Masuk';
            } else {
                btn.textContent = 'Berhasil! Mengalihkan...';
                setTimeout(() => redirectByRole(result.user.role), 500);
            }
        });

        // ── REGISTER FORM ───────────────────────
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError(); hideSuccess();

            const nik      = document.getElementById('regNik').value.trim();
            const username = document.getElementById('regUsername').value.trim();
            const name     = document.getElementById('regName').value.trim();
            const email    = document.getElementById('regEmail').value.trim();
            const phone    = document.getElementById('regPhone').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm  = document.getElementById('regPasswordConfirm').value;

            if (!/^[0-9]{16}$/.test(nik))   { showError('NIK harus 16 digit angka'); return; }
            if (!/^[0-9]{10,15}$/.test(phone)) { showError('No. telepon harus 10-15 digit angka'); return; }
            if (password !== confirm)        { showError('Password dan konfirmasi tidak cocok'); return; }

            const btn = document.getElementById('registerBtn');
            btn.disabled = true; btn.textContent = 'Membuat akun...';

            const result = await handleRegister(username, name, password, nik, email, phone);

            if (result.error) {
                showError(result.error);
                btn.disabled = false; btn.textContent = 'Buat Akun';
            } else {
                btn.textContent = 'Berhasil! Mengalihkan...';
                setTimeout(() => redirectByRole(result.user.role), 500);
            }
        });

        // ── FORGOT PASSWORD ─────────────────────
        function openForgotModal() {
            hideError(); hideSuccess();
            document.getElementById('forgotForm').reset();
            document.getElementById('forgotError').classList.remove('show');
            document.getElementById('forgotSuccess').classList.remove('show');
            document.getElementById('forgotModal').classList.add('active');
        }
        function closeForgotModal() {
            document.getElementById('forgotModal').classList.remove('active');
        }

        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errEl  = document.getElementById('forgotError');
            const succEl = document.getElementById('forgotSuccess');
            errEl.classList.remove('show');
            succEl.classList.remove('show');

            const nik         = document.getElementById('forgotNik').value.trim();
            const email       = document.getElementById('forgotEmail').value.trim();
            const newPassword = document.getElementById('forgotNewPassword').value;
            const confirmPw   = document.getElementById('forgotNewPasswordConfirm').value;

            if (!/^[0-9]{16}$/.test(nik)) { errEl.textContent = 'NIK harus 16 digit angka'; errEl.classList.add('show'); return; }
            if (newPassword !== confirmPw) { errEl.textContent = 'Password baru dan konfirmasi tidak cocok'; errEl.classList.add('show'); return; }

            const btn = document.getElementById('forgotBtn');
            btn.disabled = true; btn.textContent = 'Memproses...';

            const result = await handleForgotPassword(nik, email, newPassword);

            if (result.error) {
                errEl.textContent = result.error;
                errEl.classList.add('show');
                btn.disabled = false; btn.textContent = 'Reset Password';
            } else {
                succEl.textContent = `Password berhasil direset! Username Anda: ${result.username}`;
                succEl.classList.add('show');
                btn.textContent = '✅ Berhasil';
                setTimeout(() => {
                    closeForgotModal();
                    // Pre-fill username in login form
                    document.getElementById('loginUsername').value = result.username;
                    document.getElementById('loginPassword').focus();
                    showSuccess(`Password direset. Silakan login dengan username: ${result.username}`);
                    // Switch to login tab
                    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.auth-view').forEach(v => v.classList.remove('active'));
                    document.getElementById('tabLogin').classList.add('active');
                    document.getElementById('loginView').classList.add('active');
                }, 1500);
            }
        });

        // ── GOOGLE SIGN-IN ──────────────────────
        function triggerGoogleSignIn() {
            if (!window.google || !google.accounts) {
                showAuthToast('Google Sign-In tidak tersedia. Pastikan koneksi internet aktif.', 'error');
                return;
            }
            google.accounts.id.initialize({
                client_id: '558866885346-446sgomhumovfonhgepgq5a84qo8k9om.apps.googleusercontent.com',
                callback: onGoogleCredential,
            });
            google.accounts.id.prompt();
        }

        async function onGoogleCredential(response) {
            hideError();
            const result = await handleGoogleSignIn(response.credential);
            if (result.user) {
                showAuthToast('Berhasil masuk! Mengalihkan...');
                setTimeout(() => redirectByRole(result.user.role), 500);
            } else if (result.needsNik) {
                pendingGoogleData = result.googleData;
                showGoogleCompleteModal(result.googleData);
            } else {
                showError(result.error);
            }
        }

        function showGoogleCompleteModal(data) {
            document.getElementById('googlePreview').innerHTML = `
                <img src="${data.picture || ''}" alt="${data.name}" onerror="this.style.display='none'">
                <div>
                    <div class="pv-name">${data.name}</div>
                    <div class="pv-email">${data.email}</div>
                </div>
            `;
            document.getElementById('googleModal').classList.add('active');
        }

        document.getElementById('googleCompleteForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errEl = document.getElementById('googleError');
            errEl.classList.remove('show');

            const nik      = document.getElementById('gNik').value.trim();
            const phone    = document.getElementById('gPhone').value.trim();
            const username = document.getElementById('gUsername').value.trim();
            const password = document.getElementById('gPassword').value;

            if (!/^[0-9]{16}$/.test(nik)) { errEl.textContent = 'NIK harus 16 digit angka'; errEl.classList.add('show'); return; }
            if (!/^[0-9]{10,15}$/.test(phone)) { errEl.textContent = 'No. telepon harus 10-15 digit angka'; errEl.classList.add('show'); return; }

            const btn = document.getElementById('gCompleteBtn');
            btn.disabled = true; btn.textContent = 'Membuat akun...';

            const result = await handleGoogleComplete(nik, username, password, pendingGoogleData, phone);
            if (result.error) {
                errEl.textContent = result.error;
                errEl.classList.add('show');
                btn.disabled = false; btn.textContent = 'Buat Akun';
            } else {
                btn.textContent = 'Berhasil!';
                showAuthToast('Akun berhasil dibuat! Mengalihkan...');
                setTimeout(() => redirectByRole(result.user.role), 500);
            }
        });
    </script>
</body>
</html>
