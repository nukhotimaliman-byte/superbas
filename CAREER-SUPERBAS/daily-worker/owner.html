<!--
  ═══════════════════════════════════════════════════════════════
   PT. BAROKAH AMANAH SENTOSA — Owner Dashboard (owner.html)
   Super-BAS v2.0
  ═══════════════════════════════════════════════════════════════

   STRUKTUR FILE:
   1. <head>
      - Meta tags & CDN imports (Tailwind, Chart.js, QRCode)
      - Theme Preload (cegah flash of wrong theme)
      - Tailwind Config (dark mode, custom colors)
      - External CSS: assets/owner-theme.css
   2. <body>
      - Dashboard Layout (#app)
        ├── Sidebar (desktop nav, theme toggle, logout)
        ├── Mobile Header & Nav
        └── Main Content (tab-overview, tab-employees, dll)
   3. External JS: assets/owner-app.js
      - Global Error Handler
      - Theme System (dark/light mode)
      - Config & State Management
      - Owner/Korlap Profile & Tabs
      - API Layer (fetch with timeout)
      - Data Loading (auto-discovery, field normalization)
      - Navigation & Tab Rendering
      - ML/DL Engine (Neural Network, K-Means++, PCA, Autoencoder)
      - Chart.js Integration
      - Render Functions (Overview, Employees, Attendance,
        Payroll, ID Card)
      - Settings Tab (API URL, scan sheets, Excel export)
      - Init & Auth Check
  ═══════════════════════════════════════════════════════════════
-->
<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://script.google.com https://script.googleusercontent.com;" />
  <title>Owner Dashboard — PT. BAROKAH AMANAH SENTOSA</title>
  <link rel="icon" href="assets/LogoBas.png" />

  <!-- Prevent flash: apply saved theme before render -->
  <script>
    (function(){
      var t = localStorage.getItem('bas-theme') || localStorage.getItem('bas_owner_theme') || localStorage.getItem('bas-theme-mode') || 'dark';
      document.documentElement.className = t === 'light' ? 'light' : 'dark';
    })();
  </script>

  <!-- CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script async src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" crossorigin="anonymous" onerror="console.warn('Chart.js CDN failed')"></script>
  <script async src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js" crossorigin="anonymous" onerror="console.warn('QRCode CDN failed')"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Tailwind Config -->
  <script>
    if (typeof tailwind !== 'undefined') tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            bas: { 950:'#0a0015', 900:'#10002b', 800:'#240046', 700:'#3c096c', 600:'#5a189a', 500:'#7b2cbf', 400:'#9d4edd', 300:'#2563eb', 200:'#e0aaff' },
            accent: { pink:'#3b82f6', blue:'#1d4ed8', cyan:'#4cc9f0', green:'#00f5d4', orange:'#ff9e00', red:'#ef4444' }
          }
        }
      }
    }
  </script>

  <!-- Theme & Component Styles -->
  <link rel="stylesheet" href="./assets/owner-theme.css">
</head>

<body>

<!-- ==================== DASHBOARD ==================== -->
<div id="app" class="min-h-screen">

  <!-- SIDEBAR -->
  <aside class="sidebar fixed top-0 left-0 h-full w-[260px] glass flex-col z-50 border-r border-white/5">
    <div class="p-5 border-b border-white/5">
      <div class="flex flex-col items-center gap-2">
        <div class="w-28 h-auto flex items-center justify-center">
          <img src="assets/LogoBas.png" alt="BAS Logo" class="w-full h-auto object-contain">
        </div>
      </div>
      <div id="sidebarRoleBadge" class="mt-3 flex justify-center hidden"></div>
    </div>
    <nav class="flex-1 p-3 space-y-1 overflow-y-auto" id="sideNav"></nav>
    <div class="p-3 border-t border-white/5 space-y-2">
      <div class="flex items-center justify-between px-4 py-2">
        <span class="text-[10px] font-bold text-slate-500 uppercase tracking-wider" id="themeLabel">Mode Gelap</span>
        <button class="theme-toggle" onclick="toggleTheme()" title="Ganti Mode Terang/Gelap" aria-label="Toggle theme">
          <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
          <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
      <button onclick="logout()" class="sidebar-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-xs font-semibold text-slate-500 hover:text-red-400 border border-transparent">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Keluar
      </button>
    </div>
  </aside>

  <!-- MOBILE HEADER -->
  <header class="lg:hidden glass sticky top-0 z-40 border-b border-white/5 px-4 py-3 flex items-center justify-between safe-top">
    <div class="flex items-center gap-3">
      <img src="assets/LogoBas.png" alt="BAS Logo" class="h-6 w-auto object-contain">
      <div>
        <h2 class="font-extrabold text-sm text-white leading-none tracking-tight" id="mobileTitle">Owner Portal</h2>
        <p class="text-[8px] text-accent-cyan font-bold uppercase tracking-[0.2em] mt-0.5" id="mobileSub">ML Analytics</p>
      </div>
    </div>
    <div class="flex items-center gap-1">
      <button class="theme-toggle" onclick="toggleTheme()" title="Ganti Mode" aria-label="Toggle theme">
        <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <a href="app.html" class="p-2.5 rounded-xl hover:bg-white/5 text-slate-500 transition-colors active:scale-95" title="Kembali ke App"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 17l-5-5m0 0l5-5m-5 5h12"/></svg></a>
      <button onclick="logout()" class="p-2.5 rounded-xl hover:bg-red-500/10 text-slate-500 hover:text-red-400 transition-colors active:scale-95" title="Keluar"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg></button>
    </div>
  </header>

  <!-- MOBILE NAV -->
  <nav class="m-nav fixed bottom-0 left-0 right-0 z-50 glass border-t border-white/5 items-center h-[64px] px-2 safe-bottom" id="mobileNav"></nav>

  <!-- MAIN -->
  <div class="main min-h-screen">
    <div id="loader" class="flex flex-col items-center justify-center h-[80vh]">
      <div class="relative mb-5"><div class="w-14 h-14 border-4 border-white/5 rounded-full"></div><div class="w-14 h-14 border-4 border-accent-pink rounded-full border-t-transparent animate-spin absolute top-0 left-0"></div></div>
      <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] animate-pulse">Memuat Data & ML Engine...</p>
    </div>
    <div id="tab-overview" class="hidden p-4 sm:p-6 lg:p-8 space-y-5"></div>
    <div id="tab-employees" class="hidden p-4 sm:p-6 lg:p-8 space-y-5"></div>
    <div id="tab-attendance" class="hidden p-4 sm:p-6 lg:p-8 space-y-5"></div>
    <div id="tab-payroll" class="hidden p-4 sm:p-6 lg:p-8 space-y-5"></div>

    <div id="tab-idcard" class="hidden p-4 sm:p-6 lg:p-8 space-y-5"></div>
    <div id="tab-photomonitor" class="hidden p-4 sm:p-6 lg:p-8 space-y-5"></div>
    <div id="tab-settings" class="hidden p-4 sm:p-6 lg:p-8 space-y-5"></div>
  </div>
</div>

<!-- Toast notification container -->
<div id="toastContainer" class="fixed top-4 right-4 z-[10000] flex flex-col gap-2 pointer-events-none"></div>

<!-- Confirmation Modal -->
<div id="confirmModal" class="fixed inset-0 z-[9999] hidden items-center justify-center bg-black/60 backdrop-blur-sm">
  <div class="bg-bas-900 border border-white/10 rounded-2xl p-6 max-w-sm w-full mx-4 shadow-2xl">
    <p id="confirmMsg" class="text-white font-semibold text-sm mb-5"></p>
    <div class="flex gap-3 justify-end">
      <button onclick="closeConfirmModal(false)" class="px-4 py-2 rounded-xl text-xs font-bold text-slate-400 border border-white/10 hover:bg-white/5 transition-all">Batal</button>
      <button onclick="closeConfirmModal(true)" class="px-4 py-2 rounded-xl text-xs font-bold text-white bg-accent-pink hover:bg-accent-pink/80 transition-all">Ya, Lanjutkan</button>
    </div>
  </div>
</div>

<!-- ===== APP SCRIPT (theme, data, ML/DL, rendering, auth) ===== -->
<script src="./assets/owner-app.js"></script>

</body>
</html>
